<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Intercom — Operatore</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #222;
      --text: #e0e0e0;
      --muted: #555;
      --accent: #00A8FF;
      --green: #00E676;
      --red: #FF1744;
      --orange: #FF6B00;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 24px 20px 40px;
      gap: 20px;
    }

    /* Header */
    .header {
      text-align: center;
      width: 100%;
    }
    .cam-label {
      font-size: 11px;
      letter-spacing: 5px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .cam-number {
      font-size: 52px;
      font-weight: bold;
      letter-spacing: 2px;
      line-height: 1;
    }
    .cam-number.connected { color: var(--accent); }
    .cam-number.disconnected { color: var(--muted); }

    /* Status bar */
    .status-bar {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
    }
    .badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 5px 12px;
      font-size: 11px;
      letter-spacing: 1px;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }
    .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.red { background: var(--red); }
    .dot.orange { background: var(--orange); animation: pulse 1s infinite; }

    /* Last instruction display */
    .instruction-box {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .instruction-label {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
    }
    .instruction-text {
      font-size: 18px;
      color: var(--text);
      line-height: 1.5;
    }
    .instruction-text.empty { color: var(--muted); font-size: 14px; }
    .instruction-cue {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
      margin-top: 4px;
    }

    /* Replay button — grande, centrale */
    .replay-btn {
      width: 100%;
      max-width: 340px;
      height: 120px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 16px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.1s;
      -webkit-touch-callout: none;
    }
    .replay-btn:active, .replay-btn.playing {
      background: #00A8FF11;
      border-color: var(--accent);
      transform: scale(0.97);
    }
    .replay-btn.playing { border-color: var(--orange); }
    .replay-icon { font-size: 36px; }
    .replay-label {
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .replay-btn.playing .replay-label { color: var(--orange); }

    /* Log messaggi */
    .log-box {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .log-header {
      padding: 6px 14px;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .log-entries {
      height: 80px;
      overflow-y: auto;
      padding: 8px 14px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .log-entry {
      display: flex;
      gap: 10px;
      font-size: 11px;
    }
    .log-time { color: var(--muted); min-width: 72px; }
    .log-msg { color: var(--text); }
    .log-msg.ok { color: var(--green); }
    .log-msg.warn { color: var(--orange); }
    .log-msg.err { color: var(--red); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes flash {
      0% { border-color: var(--orange); background: #FF6B0022; }
      100% { border-color: var(--border); background: var(--surface); }
    }
    .flash { animation: flash 1.5s ease-out forwards; }
  </style>
</head>
<body>

  <!-- Overlay sblocco audio e test -->
  <div id="audioUnlock" style="
    position:fixed; inset:0; z-index:999;
    background:#0a0a0a;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:16px;
    padding: 30px 24px;
  ">
    <div style="font-size:44px">🎙</div>
    <div style="font-size:13px; letter-spacing:4px; color:#888; text-transform:uppercase">TV Intercom</div>
    <div id="camLabelUnlock" style="font-size:11px; letter-spacing:3px; color:#555; margin-top:-8px"></div>

    <!-- Volume slider -->
    <div style="width:100%; max-width:280px; margin-top:8px;">
      <div style="display:flex; justify-content:space-between; margin-bottom:6px;">
        <span style="font-size:10px; letter-spacing:2px; color:#555">VOLUME</span>
        <span id="volLabel" style="font-size:10px; letter-spacing:2px; color:#888">80%</span>
      </div>
      <input type="range" id="volSlider" min="0" max="100" value="80"
        oninput="document.getElementById('volLabel').textContent=this.value+'%'; setVolume(this.value); updateTestVolume(this.value)"
        style="width:100%; accent-color:#00A8FF; cursor:pointer;" />
    </div>

    <!-- Test audio -->
    <button onclick="playTestTone()" id="testBtn" style="
      width:100%; max-width:280px;
      background:#141414; border:1px solid #333; border-radius:8px;
      padding:14px; cursor:pointer;
      font-size:11px; font-family:monospace;
      letter-spacing:3px; color:#888;
      text-transform:uppercase;
    ">🔊 Test Cuffie</button>

    <div id="testResult" style="font-size:11px; letter-spacing:2px; color:#555; min-height:16px;"></div>

    <!-- Attiva -->
    <button onclick="unlockAudio()" style="
      width:100%; max-width:280px;
      background:#00A8FF; border:none; border-radius:12px;
      padding:18px; cursor:pointer;
      font-size:13px; font-family:monospace;
      letter-spacing:3px; color:#fff; font-weight:bold;
      text-transform:uppercase; margin-top:8px;
    ">Entra in servizio</button>

    <div style="font-size:10px; color:#333; letter-spacing:2px; text-align:center">
      Esegui il test cuffie prima di entrare in servizio
    </div>
  </div>

  <div class="header">
    <div class="cam-label">CAMERA</div>
    <div class="cam-number disconnected" id="camNumber">—</div>
  </div>

  <div class="status-bar">
    <div class="badge">
      <div class="dot red" id="connDot"></div>
      <span id="connLabel">DISCONNESSO</span>
    </div>
    <div class="badge">
      <div class="dot" id="audioDot" style="background:#444"></div>
      <span id="audioLabel">AUDIO PRONTO</span>
    </div>
  </div>

  <div class="instruction-box" id="instrBox">
    <div class="instruction-label">ULTIMA ISTRUZIONE</div>
    <div class="instruction-text empty" id="instrText">In attesa di istruzioni...</div>
    <div class="instruction-cue" id="instrCue"></div>
  </div>

  <button class="replay-btn" id="replayBtn" onclick="requestReplay()">
    <span class="replay-icon">↩</span>
    <span class="replay-label">Riascolta</span>
  </button>

  <div class="log-box">
    <div class="log-header">LOG</div>
    <div class="log-entries" id="logEntries">
      <div class="log-entry"><span class="log-time">--:--:--</span><span class="log-msg">Avvio sistema...</span></div>
    </div>
  </div>

<script>
// ---------------------------------------------------------------------------
// Configurazione
// ---------------------------------------------------------------------------
const params = new URLSearchParams(window.location.search);
const CAMERA_ID = parseInt(params.get("cam") || "1");
const SERVER_HOST = params.get("host") || window.location.host;
const WS_URL = `ws://${SERVER_HOST}/ws/camera/${CAMERA_ID}`;

document.getElementById("camNumber").textContent = CAMERA_ID;
document.getElementById("camNumber").classList.remove("disconnected");
document.getElementById("camNumber").classList.add("connected");

// ---------------------------------------------------------------------------
// Stato
// ---------------------------------------------------------------------------
let ws = null;
let reconnectTimer = null;
let lastAudioBlob = null;
let currentAudio = null;
let isPlaying = false;

// ---------------------------------------------------------------------------
// Log
// ---------------------------------------------------------------------------
function addLog(msg, type = "") {
  const container = document.getElementById("logEntries");
  const now = new Date().toLocaleTimeString("it-IT");
  const entry = document.createElement("div");
  entry.className = "log-entry";
  entry.innerHTML = `<span class="log-time">${now}</span><span class="log-msg ${type}">${msg}</span>`;
  container.appendChild(entry);
  container.scrollTop = container.scrollHeight;
  // Mantieni max 30 righe
  while (container.children.length > 30) container.removeChild(container.firstChild);
}

// ---------------------------------------------------------------------------
// WebSocket
// ---------------------------------------------------------------------------
function connect() {
  addLog("Connessione al server...", "warn");
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    setConnected(true);
    addLog(`Connesso — CAM ${CAMERA_ID}`, "ok");
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  };

  ws.onclose = () => {
    setConnected(false);
    addLog("Connessione persa. Riconnessione...", "err");
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => {
    addLog("Errore WebSocket", "err");
  };

  let pendingHeader = null;

  ws.onmessage = (event) => {
    if (typeof event.data === "string") {
      // Messaggio JSON — header di un'istruzione o evento
      const msg = JSON.parse(event.data);

      if (msg.type === "instruction") {
        pendingHeader = msg;
        setAudioState("receiving");
        if (msg.text) {
          updateInstruction(msg.text, msg.cue_id);
          document.getElementById("instrBox").classList.add("flash");
          addLog(`▶ ${msg.cue_id}`, "ok");
        }
      } else if (msg.type === "replay") {
        pendingHeader = msg;
        setAudioState("receiving");
      } else if (msg.type === "no_replay") {
        addLog("Nessun messaggio da riascoltare", "warn");
      } else if (msg.type === "instruction_text") {
        updateInstruction(msg.text, msg.cue_id);
        document.getElementById("instrBox").classList.add("flash");
        addLog(`▶ ${msg.cue_id}`, "ok");
      }

    } else if (event.data instanceof Blob) {
      // Bytes audio in arrivo
      lastAudioBlob = event.data;
      if (pendingHeader) {
        const cue = pendingHeader.cue_id || "";
        const type = pendingHeader.type;
        pendingHeader = null;
        playAudio(lastAudioBlob, cue, type === "replay");
      }
    }
  };
}

// ---------------------------------------------------------------------------
// Audio
// ---------------------------------------------------------------------------
async function playAudio(blob, cueId, isReplay) {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }

  const url = URL.createObjectURL(blob);
  currentAudio = new Audio(url);
  currentAudio.volume = masterVolume;
  isPlaying = true;

  setAudioState("playing");
  setReplayPlaying(true);

  if (!isReplay) {
    // Mostra testo istruzione nel box (il testo arriva nel successivo tick)
    // Per ora mostra il cue_id come feedback visivo
    document.getElementById("instrCue").textContent = cueId;
    document.getElementById("instrBox").classList.add("flash");
  }

  addLog(isReplay ? "↩ Replay" : `▶ ${cueId}`, "ok");

  currentAudio.onended = () => {
    isPlaying = false;
    setAudioState("ready");
    setReplayPlaying(false);
    URL.revokeObjectURL(url);
  };

  try {
    await currentAudio.play();
  } catch(e) {
    // Autoplay bloccato — richiede interazione utente
    addLog("Tocca lo schermo per abilitare audio", "warn");
    setAudioState("ready");
    setReplayPlaying(false);
  }
}

function requestReplay() {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    addLog("Non connesso", "err");
    return;
  }
  // Prima prova replay locale (più veloce)
  if (lastAudioBlob) {
    playAudio(lastAudioBlob, "", true);
  } else {
    // Chiedi al server
    ws.send(JSON.stringify({ type: "replay" }));
  }
}

// ---------------------------------------------------------------------------
// UI helpers
// ---------------------------------------------------------------------------
function setConnected(connected) {
  const dot = document.getElementById("connDot");
  const label = document.getElementById("connLabel");
  dot.className = "dot " + (connected ? "green" : "red");
  label.textContent = connected ? "CONNESSO" : "DISCONNESSO";
}

function setAudioState(state) {
  const dot = document.getElementById("audioDot");
  const label = document.getElementById("audioLabel");
  if (state === "receiving") {
    dot.className = "dot orange";
    label.textContent = "RICEZIONE";
  } else if (state === "playing") {
    dot.className = "dot green";
    label.textContent = "IN RIPRODUZIONE";
  } else {
    dot.style.background = "#444";
    dot.className = "dot";
    label.textContent = "AUDIO PRONTO";
  }
}

function setReplayPlaying(playing) {
  document.getElementById("replayBtn").classList.toggle("playing", playing);
}

// Aggiorna testo istruzione quando arriva via WS (futuro: il server
// può mandare anche il testo dell'istruzione nell'header)
function updateInstruction(text, cueId) {
  const el = document.getElementById("instrText");
  el.textContent = text;
  el.classList.remove("empty");
  document.getElementById("instrCue").textContent = cueId;
}

// ---------------------------------------------------------------------------
// Avvio
// ---------------------------------------------------------------------------
// Mostra numero camera nell'overlay
document.getElementById("camLabelUnlock").textContent = "CAMERA " + CAMERA_ID;
let audioUnlocked = false;
let masterVolume = 0.8;
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  audioCtx.resume();
  return audioCtx;
}

function setVolume(val) {
  masterVolume = val / 100;
  if (currentAudio) currentAudio.volume = masterVolume;
}

let testAudio = null;

function updateTestVolume(val) {
  if (testAudio && !testAudio.paused) {
    testAudio.volume = val / 100;
  }
}

async function playTestTone() {
  const btn = document.getElementById("testBtn");
  const result = document.getElementById("testResult");

  btn.style.borderColor = "#00A8FF";
  btn.style.color = "#00A8FF";
  btn.textContent = "⏳ Caricamento...";
  result.textContent = "Richiesta audio al server...";
  result.style.color = "#00A8FF";

  getAudioCtx(); // sblocca AudioContext

  try {
    const resp = await fetch(`http://${SERVER_HOST}/api/tts/test-audio`);
    if (!resp.ok) throw new Error("Server non raggiungibile");

    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    testAudio = new Audio(url);
    const audio = testAudio;
    audio.volume = masterVolume;

    audio.onended = () => {
      result.textContent = "✓ Hai sentito il messaggio? Cuffie ok!";
      result.style.color = "#00E676";
      btn.style.borderColor = "#00E676";
      btn.style.color = "#00E676";
      btn.textContent = "🔊 Riprova Test";
      URL.revokeObjectURL(url);
    };

    audio.onerror = () => {
      result.textContent = "Errore riproduzione audio";
      result.style.color = "#FF1744";
      btn.textContent = "🔊 Test Cuffie";
    };

    await audio.play();
    result.textContent = "▶ Riproduzione in corso...";

  } catch(e) {
    result.textContent = "Errore: " + e.message;
    result.style.color = "#FF1744";
    btn.style.borderColor = "#333";
    btn.style.color = "#888";
    btn.textContent = "🔊 Test Cuffie";
  }
}

function unlockAudio() {
  getAudioCtx();
  audioUnlocked = true;
  document.getElementById("audioUnlock").style.display = "none";
  addLog("Audio abilitato — volume: " + Math.round(masterVolume * 100) + "%", "ok");
  connect();
}

// Imposta volume su ogni audio riprodotto
const _origPlayAudio = playAudio;
</script>
</body>
</html>
