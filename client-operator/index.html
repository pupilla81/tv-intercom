<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Intercom — Operatore</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #222;
      --text: #e0e0e0;
      --muted: #555;
      --accent: #00A8FF;
      --green: #00E676;
      --red: #FF1744;
      --orange: #FF6B00;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 24px 20px 40px;
      gap: 20px;
    }

    /* Header */
    .header {
      text-align: center;
      width: 100%;
    }
    .cam-label {
      font-size: 11px;
      letter-spacing: 5px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .cam-number {
      font-size: 52px;
      font-weight: bold;
      letter-spacing: 2px;
      line-height: 1;
    }
    .cam-number.connected { color: var(--accent); }
    .cam-number.disconnected { color: var(--muted); }

    /* Status bar */
    .status-bar {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
    }
    .badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 5px 12px;
      font-size: 11px;
      letter-spacing: 1px;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }
    .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.red { background: var(--red); }
    .dot.orange { background: var(--orange); animation: pulse 1s infinite; }

    /* Last instruction display */
    .instruction-box {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .instruction-label {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
    }
    .instruction-text {
      font-size: 18px;
      color: var(--text);
      line-height: 1.5;
    }
    .instruction-text.empty { color: var(--muted); font-size: 14px; }
    .instruction-cue {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
      margin-top: 4px;
    }

    /* Replay button — grande, centrale */
    .replay-btn {
      width: 100%;
      max-width: 340px;
      height: 120px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 16px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.1s;
      -webkit-touch-callout: none;
    }
    .replay-btn:active, .replay-btn.playing {
      background: #00A8FF11;
      border-color: var(--accent);
      transform: scale(0.97);
    }
    .replay-btn.playing { border-color: var(--orange); }
    .replay-icon { font-size: 36px; }
    .replay-label {
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .replay-btn.playing .replay-label { color: var(--orange); }

    /* Log messaggi */
    .log-box {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .log-header {
      padding: 6px 14px;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .log-entries {
      height: 80px;
      overflow-y: auto;
      padding: 8px 14px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .log-entry {
      display: flex;
      gap: 10px;
      font-size: 11px;
    }
    .log-time { color: var(--muted); min-width: 72px; }
    .log-msg { color: var(--text); }
    .log-msg.ok { color: var(--green); }
    .log-msg.warn { color: var(--orange); }
    .log-msg.err { color: var(--red); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes flash {
      0% { border-color: var(--orange); background: #FF6B0022; }
      100% { border-color: var(--border); background: var(--surface); }
    }
    .flash { animation: flash 1.5s ease-out forwards; }
  </style>
</head>
<body>

  <div class="header">
    <div class="cam-label">CAMERA</div>
    <div class="cam-number disconnected" id="camNumber">—</div>
  </div>

  <div class="status-bar">
    <div class="badge">
      <div class="dot red" id="connDot"></div>
      <span id="connLabel">DISCONNESSO</span>
    </div>
    <div class="badge">
      <div class="dot" id="audioDot" style="background:#444"></div>
      <span id="audioLabel">AUDIO PRONTO</span>
    </div>
  </div>

  <div class="instruction-box" id="instrBox">
    <div class="instruction-label">ULTIMA ISTRUZIONE</div>
    <div class="instruction-text empty" id="instrText">In attesa di istruzioni...</div>
    <div class="instruction-cue" id="instrCue"></div>
  </div>

  <button class="replay-btn" id="replayBtn" onclick="requestReplay()">
    <span class="replay-icon">↩</span>
    <span class="replay-label">Riascolta</span>
  </button>

  <div class="log-box">
    <div class="log-header">LOG</div>
    <div class="log-entries" id="logEntries">
      <div class="log-entry"><span class="log-time">--:--:--</span><span class="log-msg">Avvio sistema...</span></div>
    </div>
  </div>

<script>
// ---------------------------------------------------------------------------
// Configurazione
// ---------------------------------------------------------------------------
const params = new URLSearchParams(window.location.search);
const CAMERA_ID = parseInt(params.get("cam") || "1");
const SERVER_HOST = params.get("host") || window.location.host;
const WS_URL = `ws://${SERVER_HOST}/ws/camera/${CAMERA_ID}`;

document.getElementById("camNumber").textContent = CAMERA_ID;
document.getElementById("camNumber").classList.remove("disconnected");
document.getElementById("camNumber").classList.add("connected");

// ---------------------------------------------------------------------------
// Stato
// ---------------------------------------------------------------------------
let ws = null;
let reconnectTimer = null;
let lastAudioBlob = null;
let currentAudio = null;
let isPlaying = false;

// ---------------------------------------------------------------------------
// Log
// ---------------------------------------------------------------------------
function addLog(msg, type = "") {
  const container = document.getElementById("logEntries");
  const now = new Date().toLocaleTimeString("it-IT");
  const entry = document.createElement("div");
  entry.className = "log-entry";
  entry.innerHTML = `<span class="log-time">${now}</span><span class="log-msg ${type}">${msg}</span>`;
  container.appendChild(entry);
  container.scrollTop = container.scrollHeight;
  // Mantieni max 30 righe
  while (container.children.length > 30) container.removeChild(container.firstChild);
}

// ---------------------------------------------------------------------------
// WebSocket
// ---------------------------------------------------------------------------
function connect() {
  addLog("Connessione al server...", "warn");
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    setConnected(true);
    addLog(`Connesso — CAM ${CAMERA_ID}`, "ok");
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  };

  ws.onclose = () => {
    setConnected(false);
    addLog("Connessione persa. Riconnessione...", "err");
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => {
    addLog("Errore WebSocket", "err");
  };

  let pendingHeader = null;

  ws.onmessage = (event) => {
    if (typeof event.data === "string") {
      // Messaggio JSON — header di un'istruzione o evento
      const msg = JSON.parse(event.data);

      if (msg.type === "instruction" || msg.type === "replay") {
        pendingHeader = msg;
        setAudioState("receiving");
      } else if (msg.type === "no_replay") {
        addLog("Nessun messaggio da riascoltare", "warn");
      }

    } else if (event.data instanceof Blob) {
      // Bytes audio in arrivo
      lastAudioBlob = event.data;
      if (pendingHeader) {
        const cue = pendingHeader.cue_id || "";
        const type = pendingHeader.type;
        pendingHeader = null;
        playAudio(lastAudioBlob, cue, type === "replay");
      }
    }
  };
}

// ---------------------------------------------------------------------------
// Audio
// ---------------------------------------------------------------------------
async function playAudio(blob, cueId, isReplay) {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }

  const url = URL.createObjectURL(blob);
  currentAudio = new Audio(url);
  isPlaying = true;

  setAudioState("playing");
  setReplayPlaying(true);

  if (!isReplay) {
    // Mostra testo istruzione nel box (il testo arriva nel successivo tick)
    // Per ora mostra il cue_id come feedback visivo
    document.getElementById("instrCue").textContent = cueId;
    document.getElementById("instrBox").classList.add("flash");
  }

  addLog(isReplay ? "↩ Replay" : `▶ ${cueId}`, "ok");

  currentAudio.onended = () => {
    isPlaying = false;
    setAudioState("ready");
    setReplayPlaying(false);
    URL.revokeObjectURL(url);
  };

  try {
    await currentAudio.play();
  } catch(e) {
    // Autoplay bloccato — richiede interazione utente
    addLog("Tocca lo schermo per abilitare audio", "warn");
    setAudioState("ready");
    setReplayPlaying(false);
  }
}

function requestReplay() {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    addLog("Non connesso", "err");
    return;
  }
  // Prima prova replay locale (più veloce)
  if (lastAudioBlob) {
    playAudio(lastAudioBlob, "", true);
  } else {
    // Chiedi al server
    ws.send(JSON.stringify({ type: "replay" }));
  }
}

// ---------------------------------------------------------------------------
// UI helpers
// ---------------------------------------------------------------------------
function setConnected(connected) {
  const dot = document.getElementById("connDot");
  const label = document.getElementById("connLabel");
  dot.className = "dot " + (connected ? "green" : "red");
  label.textContent = connected ? "CONNESSO" : "DISCONNESSO";
}

function setAudioState(state) {
  const dot = document.getElementById("audioDot");
  const label = document.getElementById("audioLabel");
  if (state === "receiving") {
    dot.className = "dot orange";
    label.textContent = "RICEZIONE";
  } else if (state === "playing") {
    dot.className = "dot green";
    label.textContent = "IN RIPRODUZIONE";
  } else {
    dot.style.background = "#444";
    dot.className = "dot";
    label.textContent = "AUDIO PRONTO";
  }
}

function setReplayPlaying(playing) {
  document.getElementById("replayBtn").classList.toggle("playing", playing);
}

// Aggiorna testo istruzione quando arriva via WS (futuro: il server
// può mandare anche il testo dell'istruzione nell'header)
function updateInstruction(text, cueId) {
  const el = document.getElementById("instrText");
  el.textContent = text;
  el.classList.remove("empty");
  document.getElementById("instrCue").textContent = cueId;
}

// ---------------------------------------------------------------------------
// Avvio
// ---------------------------------------------------------------------------
// Sblocca audio su primo tocco (requisito browser mobile)
document.addEventListener("touchstart", () => {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  ctx.resume();
}, { once: true });

connect();
</script>
</body>
</html>
