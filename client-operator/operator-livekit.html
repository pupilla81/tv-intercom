<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Intercom — CAM</title>
<style>
:root {
  --bg: #0a0a0a; --surface: #141414; --border: #222;
  --text: #e0e0e0; --muted: #555;
  --accent: #00A8FF; --green: #00E676; --red: #FF1744; --orange: #FF6B00;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Courier New', monospace;
  min-height: 100dvh; display: flex; flex-direction: column;
  align-items: center; justify-content: space-between;
  padding: 24px 20px 40px; gap: 16px; user-select: none;
}
.cam-label { font-size:11px; letter-spacing:5px; color:var(--muted); text-transform:uppercase; }
.cam-number { font-size:52px; font-weight:bold; letter-spacing:2px; line-height:1; color:var(--accent); }
.badge { display:flex; align-items:center; gap:6px; background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:5px 12px; font-size:11px; letter-spacing:1px; }
.dot { width:7px; height:7px; border-radius:50%; }
.dot.green { background:var(--green); box-shadow:0 0 6px var(--green); }
.dot.red { background:var(--red); }
.dot.orange { background:var(--orange); animation:pulse 0.8s infinite; }
.status-bar { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; width:100%; }

/* PTT Button — grande, centrale */
.ptt-btn {
  width: 200px; height: 200px;
  border-radius: 50%;
  border: 3px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px;
  transition: all 0.08s;
  -webkit-touch-callout: none;
}
.ptt-btn:active, .ptt-btn.active {
  background: rgba(255,107,0,0.15);
  border-color: var(--orange);
  box-shadow: 0 0 40px rgba(255,107,0,0.4);
  transform: scale(0.96);
}
.ptt-icon { font-size: 48px; }
.ptt-label { font-size:11px; letter-spacing:4px; color:var(--muted); text-transform:uppercase; }
.ptt-btn.active .ptt-label { color:var(--orange); }

/* Replay button */
.replay-btn {
  width:100%; max-width:340px; height:80px;
  background:var(--surface); border:2px solid var(--border); border-radius:12px;
  cursor:pointer; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:6px; transition:all 0.1s;
}
.replay-btn:active { background:#00A8FF11; border-color:var(--accent); }

.log-box { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.log-header { padding:6px 14px; font-size:10px; letter-spacing:3px; color:var(--muted); border-bottom:1px solid var(--border); }
.log-entries { height:80px; overflow-y:auto; padding:8px 14px; display:flex; flex-direction:column; gap:3px; }
.log-entry { display:flex; gap:10px; font-size:11px; }
.log-time { color:var(--muted); min-width:72px; }
.log-msg.ok { color:var(--green); }
.log-msg.warn { color:var(--orange); }
.log-msg.err { color:var(--red); }

/* Unlock overlay */
#overlay {
  position:fixed; inset:0; z-index:999; background:#0a0a0a;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:0; padding:28px 24px; overflow-y:auto;
}
.ov-logo { font-size:38px; margin-bottom:8px; }
.ov-title { font-size:13px; letter-spacing:4px; color:#888; text-transform:uppercase; margin-bottom:4px; }
.ov-cam   { font-size:11px; letter-spacing:3px; color:#444; margin-bottom:20px; }

/* Test audio card */
.ov-card {
  width:100%; max-width:320px;
  background:#141414; border:1px solid #2a2a2a; border-radius:12px;
  padding:16px 18px; margin-bottom:12px;
}
.ov-card-title {
  font-size:9px; letter-spacing:3px; text-transform:uppercase;
  color:#555; margin-bottom:12px;
}

/* Volume slider */
.ov-vol-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.ov-vol-icon { font-size:18px; flex-shrink:0; }
.ov-vol-slider {
  -webkit-appearance:none; flex:1; height:4px;
  background:#2a2a2a; border-radius:2px; outline:none; cursor:pointer;
}
.ov-vol-slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:20px; height:20px;
  border-radius:50%; background:var(--accent); cursor:pointer;
}
.ov-vol-val { font-size:11px; color:var(--accent); min-width:36px; text-align:right; }

/* VU meter mic */
.ov-vu-row { display:flex; align-items:center; gap:10px; }
.ov-vu-icon { font-size:18px; flex-shrink:0; }
.ov-vu-wrap { flex:1; height:8px; background:#1a1a1a; border-radius:4px; overflow:hidden; }
.ov-vu-bar  { height:100%; width:0%; border-radius:4px; background:var(--green); transition:width 0.05s; }
.ov-vu-bar.warn { background:var(--orange); }
.ov-vu-bar.hot  { background:var(--red); }
.ov-vu-lbl { font-size:9px; letter-spacing:2px; color:#444; min-width:36px; text-align:right; }

/* Test button */
.ov-test-btn {
  width:100%; padding:12px; border-radius:8px; cursor:pointer;
  background:#1a2a1a; border:1px solid var(--green); color:var(--green);
  font-family:monospace; font-size:11px; letter-spacing:3px; text-transform:uppercase;
  margin-bottom:0; transition:all 0.15s;
}
.ov-test-btn:active { background:#003300; }
.ov-test-status {
  font-size:9px; letter-spacing:2px; color:#444; text-align:center;
  margin-top:8px; min-height:14px;
}

.unlock-btn {
  width:100%; max-width:320px; background:var(--accent);
  border:none; border-radius:12px; padding:18px; cursor:pointer;
  font-size:13px; font-family:monospace; letter-spacing:3px;
  color:#fff; font-weight:bold; text-transform:uppercase;
  margin-top:4px; transition:all 0.15s;
}
.unlock-btn:active { filter:brightness(0.85); }

/* VU meter mic nella schermata operativa */
.mic-vu-wrap {
  width:100%; max-width:340px;
  display:flex; align-items:center; gap:10px;
}
.mic-vu-bar-outer {
  flex:1; height:6px; background:var(--surface); border-radius:3px;
  border:1px solid var(--border); overflow:hidden;
}
.mic-vu-bar-inner { height:100%; width:0%; border-radius:3px; background:var(--green); transition:width 0.05s; }
.mic-vu-bar-inner.warn { background:var(--orange); }
.mic-vu-bar-inner.hot  { background:var(--red); }
.mic-vu-lbl { font-size:9px; letter-spacing:2px; color:var(--muted); min-width:28px; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>

<!-- Silent audio loop — Spotify approach -->
<audio id="silentAudio" loop preload="auto" style="display:none" src="/operator/silent.mp3"></audio>

<!-- Unlock overlay -->
<div id="overlay">
  <div class="ov-logo">🎙</div>
  <div class="ov-title">TV Intercom</div>
  <div class="ov-cam" id="camLabelOverlay"></div>

  <!-- Test cuffie -->
  <div class="ov-card">
    <div class="ov-card-title">🎧 Test cuffie</div>
    <div class="ov-vol-row">
      <span class="ov-vol-icon">🔊</span>
      <input type="range" class="ov-vol-slider" id="volSlider" min="0" max="100" value="80"
        oninput="updateVolume(this.value)"/>
      <span class="ov-vol-val" id="volVal">80%</span>
    </div>
    <button class="ov-test-btn" id="testAudioBtn" onclick="testAudio()">▶ ASCOLTA TEST AUDIO</button>
    <div class="ov-test-status" id="testStatus">Premi per verificare le cuffie</div>
  </div>

  <!-- VU meter microfono -->
  <div class="ov-card">
    <div class="ov-card-title">🎤 Livello microfono</div>
    <div class="ov-vu-row">
      <span class="ov-vu-icon">🎤</span>
      <div class="ov-vu-wrap"><div class="ov-vu-bar" id="ovVuBar"></div></div>
      <span class="ov-vu-lbl" id="ovVuLbl">—</span>
    </div>
    <div style="font-size:9px;color:#444;letter-spacing:1px;margin-top:8px;text-align:center;">
      Parla per verificare che il microfono riceva segnale
    </div>
  </div>

  <button class="unlock-btn" onclick="unlock()">▶ ENTRA IN SERVIZIO</button>
  <div style="font-size:9px;color:#444;letter-spacing:1px;text-align:center;margin-top:8px;line-height:1.8;">
    Tieni lo schermo acceso durante il servizio<br>
    <span style="color:#666;">Su Android usa Firefox per microfono attivo con schermo bloccato</span>
  </div>
</div>

<div style="text-align:center;">
  <div class="cam-label">CAMERA</div>
  <div class="cam-number" id="camNum">—</div>
</div>

<div class="status-bar">
  <div class="badge"><div class="dot red" id="wsDot"></div><span id="wsLabel">ISTRUZIONI</span></div>
  <div class="badge"><div class="dot red" id="lkDot"></div><span id="lkLabel">VOCE</span></div>
</div>

<!-- PTT button -->
<button class="ptt-btn" id="pttBtn">
  <span class="ptt-icon">🎙</span>
  <span class="ptt-label" id="pttLabel">TIENI PER PARLARE</span>
</button>

<!-- VU meter mic nella schermata operativa -->
<div class="mic-vu-wrap">
  <span class="mic-vu-lbl">🎤</span>
  <div class="mic-vu-bar-outer">
    <div class="mic-vu-bar-inner" id="micVuBar"></div>
  </div>
  <span class="mic-vu-lbl" id="micVuPct" style="text-align:right"></span>
</div>

<!-- Replay last instruction -->
<button class="replay-btn" onclick="requestReplay()">
  <span style="font-size:24px">↩</span>
  <span style="font-size:10px;letter-spacing:3px;color:var(--muted)">RIASCOLTA</span>
</button>

<div class="log-box">
  <div class="log-header">LOG</div>
  <div class="log-entries" id="logEntries"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
<script>
const params       = new URLSearchParams(window.location.search);
const CAMERA_ID    = parseInt(params.get("cam") || "1");
const SERVER_HOST  = window.location.host;
const WS_PROTOCOL  = location.protocol === "https:" ? "wss" : "ws";
const HTTP_PROTOCOL = location.protocol;
const WS_URL       = `${WS_PROTOCOL}://${SERVER_HOST}/ws/camera/${CAMERA_ID}`;

document.getElementById("camNum").textContent = CAMERA_ID;
document.getElementById("camLabelOverlay").textContent = "CAMERA " + CAMERA_ID;

// Manifest dinamico
document.head.querySelector('[rel=manifest]')?.setAttribute('href', `manifest.json?cam=${CAMERA_ID}`);

let ws = null, reconnectTimer = null, heartbeatTimer = null;
let wakeLock = null, lastAudioBlob = null;
let lkRoom = null, localTrack = null;
let testAudioEl = null;
let ovVuStream = null, ovVuCtx = null, ovVuInterval = null;
let micVuCtx = null, micVuInterval = null;
let currentVolume = 0.8;

// ---------------------------------------------------------------------------
// Overlay — Test audio + Volume + VU mic
// ---------------------------------------------------------------------------
function updateVolume(val) {
  currentVolume = val / 100;
  document.getElementById('volVal').textContent = val + '%';
  if (testAudioEl) testAudioEl.volume = currentVolume;
}

async function testAudio() {
  const btn = document.getElementById('testAudioBtn');
  const status = document.getElementById('testStatus');
  // Avvia VU meter mic se non già attivo
  startOverlayVu();
  // Recupera audio test dal server
  btn.textContent = '⏳ Caricamento...';
  status.textContent = '';
  try {
    const r = await fetch(`${HTTP_PROTOCOL}//${SERVER_HOST}/api/tts/test-audio`);
    if (!r.ok) throw new Error('Audio non disponibile');
    const blob = await r.blob();
    if (testAudioEl) { testAudioEl.pause(); testAudioEl.src = ''; }
    testAudioEl = new Audio(URL.createObjectURL(blob));
    testAudioEl.volume = currentVolume;
    testAudioEl.onended = () => {
      btn.textContent = '▶ ASCOLTA TEST AUDIO';
      status.textContent = '✓ Cuffie verificate — regola il volume se necessario';
      status.style.color = 'var(--green)';
    };
    await testAudioEl.play();
    btn.textContent = '⏹ IN RIPRODUZIONE...';
    status.textContent = 'Stai ascoltando — regola il volume con lo slider';
    status.style.color = 'var(--accent)';
  } catch(e) {
    btn.textContent = '▶ ASCOLTA TEST AUDIO';
    status.textContent = 'Errore: ' + e.message;
    status.style.color = 'var(--red)';
  }
}

async function startOverlayVu() {
  if (ovVuStream) return; // già attivo
  try {
    ovVuStream = await navigator.mediaDevices.getUserMedia({audio:true, video:false});
    ovVuCtx    = new (window.AudioContext || window.webkitAudioContext)();
    const src  = ovVuCtx.createMediaStreamSource(ovVuStream);
    const analyzer = ovVuCtx.createAnalyser();
    analyzer.fftSize = 256;
    src.connect(analyzer);
    const data = new Uint8Array(analyzer.frequencyBinCount);
    const bar  = document.getElementById('ovVuBar');
    const lbl  = document.getElementById('ovVuLbl');
    ovVuInterval = setInterval(() => {
      analyzer.getByteFrequencyData(data);
      const avg = data.reduce((a,b)=>a+b,0) / data.length;
      const pct = Math.min(100, avg * 2.5);
      if (bar) {
        bar.style.width = pct + '%';
        bar.className = 'ov-vu-bar' + (pct>80?' hot':pct>55?' warn':'');
      }
      if (lbl) lbl.textContent = Math.round(pct) + '%';
    }, 50);
  } catch(e) {
    const lbl = document.getElementById('ovVuLbl');
    if (lbl) lbl.textContent = 'N/A';
  }
}

function stopOverlayVu() {
  if (ovVuInterval) { clearInterval(ovVuInterval); ovVuInterval = null; }
  if (ovVuStream)   { ovVuStream.getTracks().forEach(t=>t.stop()); ovVuStream = null; }
  if (ovVuCtx)      { ovVuCtx.close().catch(()=>{}); ovVuCtx = null; }
}

// ---------------------------------------------------------------------------
// Mic keepalive — Android background mic workaround
// Tre tecniche combinate per tenere il mic attivo con schermo bloccato:
// 1. getUserMedia con constraints "telephony" (sampleRate 8000, channelCount 1)
// 2. Loopback silenzioso: mic → AudioContext → GainNode(0) → destination
// 3. OscillatorNode silenzioso come backup per tenere attivo l'AudioContext
// ---------------------------------------------------------------------------
let keepaliveCtx    = null;
let keepaliveStream = null;
let keepaliveNodes  = [];  // [source, gain, oscillator]

async function startMicKeepalive() {
  if (keepaliveCtx) return; // già attivo
  try {
    // Constraints "telephony" — convince Android che è una chiamata
    keepaliveStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation:  true,
        noiseSuppression:  true,
        autoGainControl:   true,
        channelCount:      1,
        sampleRate:        8000,  // frequenza telefonica
      }
    });

    keepaliveCtx = new (window.AudioContext || window.webkitAudioContext)({
      sampleRate: 8000,
      latencyHint: 'interactive',
    });
    await keepaliveCtx.resume();

    // Loopback silenzioso: mic → gain(0) → destination
    // Android vede mic occupato da un AudioContext attivo → non lo sospende
    const src  = keepaliveCtx.createMediaStreamSource(keepaliveStream);
    const gain = keepaliveCtx.createGain();
    gain.gain.value = 0;  // silenzioso — nessun feedback audio
    src.connect(gain);
    gain.connect(keepaliveCtx.destination);

    // Oscillator silenzioso di backup per tenere l'AudioContext vivo
    const osc = keepaliveCtx.createOscillator();
    const oscGain = keepaliveCtx.createGain();
    oscGain.gain.value = 0;
    osc.connect(oscGain);
    oscGain.connect(keepaliveCtx.destination);
    osc.start();

    keepaliveNodes = [src, gain, osc, oscGain];
    addLog('Mic keepalive attivo (telephony mode)', 'ok');
  } catch(e) {
    addLog('Mic keepalive non disponibile: ' + e.message, 'warn');
  }
}

function stopMicKeepalive() {
  keepaliveNodes.forEach(n => { try { n.disconnect(); } catch(x) {} });
  keepaliveNodes = [];
  if (keepaliveStream) { keepaliveStream.getTracks().forEach(t => t.stop()); keepaliveStream = null; }
  if (keepaliveCtx)    { keepaliveCtx.close().catch(()=>{}); keepaliveCtx = null; }
}

// VU meter mic nella schermata operativa (usa il track LiveKit)
function startMicVu(track) {
  if (!track?.mediaStreamTrack) return;
  try {
    micVuCtx = new (window.AudioContext || window.webkitAudioContext)();
    const stream   = new MediaStream([track.mediaStreamTrack]);
    const src      = micVuCtx.createMediaStreamSource(stream);
    const analyzer = micVuCtx.createAnalyser();
    analyzer.fftSize = 256;
    src.connect(analyzer);
    const data = new Uint8Array(analyzer.frequencyBinCount);
    const bar  = document.getElementById('micVuBar');
    const pct  = document.getElementById('micVuPct');
    micVuInterval = setInterval(() => {
      analyzer.getByteFrequencyData(data);
      const avg = data.reduce((a,b)=>a+b,0) / data.length;
      const p   = Math.min(100, avg * 2.5);
      if (bar) {
        bar.style.width = p + '%';
        bar.className = 'mic-vu-bar-inner' + (p>80?' hot':p>55?' warn':'');
      }
      if (pct) pct.textContent = Math.round(p) + '%';
    }, 50);
  } catch(e) {}
}

function stopMicVu() {
  if (micVuInterval) { clearInterval(micVuInterval); micVuInterval = null; }
  if (micVuCtx)      { micVuCtx.close().catch(()=>{}); micVuCtx = null; }
}

// ---------------------------------------------------------------------------
// Log
// ---------------------------------------------------------------------------
function addLog(msg, type = "") {
  const c = document.getElementById("logEntries");
  const t = new Date().toLocaleTimeString("it-IT");
  const e = document.createElement("div");
  e.className = "log-entry";
  e.innerHTML = `<span class="log-time">${t}</span><span class="log-msg ${type}">${msg}</span>`;
  c.appendChild(e);
  c.scrollTop = c.scrollHeight;
  while (c.children.length > 30) c.removeChild(c.firstChild);
}

// ---------------------------------------------------------------------------
// Unlock
// ---------------------------------------------------------------------------
async function unlock() {
  // Ferma VU meter overlay e test audio
  stopOverlayVu();
  if (testAudioEl) { testAudioEl.pause(); testAudioEl = null; }
  document.getElementById("overlay").style.display = "none";

  // Avvia silent audio (Spotify approach)
  const silent = document.getElementById("silentAudio");
  silent.volume = 0.001;
  silent.play().catch(()=>{});

  // MediaSession
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: `TV Intercom — CAM ${CAMERA_ID}`, artist: 'In servizio', album: 'TV Intercom',
    });
    navigator.mediaSession.playbackState = 'playing';
    navigator.mediaSession.setActionHandler('play', () => silent.play());
    navigator.mediaSession.setActionHandler('pause', () => silent.play());
  }
  // Wake Lock
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
  }
  // Mic keepalive — tiene il mic attivo con schermo bloccato su Android
  await startMicKeepalive();
  // Connetti
  connectWS();
  connectLiveKit();
}

// ---------------------------------------------------------------------------
// WebSocket — istruzioni automatiche (invariato)
// ---------------------------------------------------------------------------
function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    document.getElementById("wsDot").className = "dot green";
    document.getElementById("wsLabel").textContent = "ISTRUZIONI ✓";
    addLog("Istruzioni connesse", "ok");
    startHeartbeat();
  };
  ws.onclose = () => {
    document.getElementById("wsDot").className = "dot red";
    document.getElementById("wsLabel").textContent = "ISTRUZIONI";
    reconnectTimer = setTimeout(connectWS, 3000);
  };
  ws.onmessage = (event) => {
    if (typeof event.data === "string") {
      const msg = JSON.parse(event.data);
      if (msg.type === "instruction" || msg.type === "instruction_text") {
        if (msg.text) addLog(`▶ ${msg.text}`, "ok");
      } else if (msg.type === "join_conference") {
        addLog("Conference: ricevuto invito", "warn");
        joinConference(msg.token);
      } else if (msg.type === "leave_conference") {
        addLog("Conference: chiusa dalla regia", "warn");
        leaveConference();
      } else if (msg.type === "pong") {}
    } else if (event.data instanceof Blob) {
      lastAudioBlob = event.data;
      playAudioBlob(event.data);
    }
  };
}

function startHeartbeat() {
  if (heartbeatTimer) clearInterval(heartbeatTimer);
  heartbeatTimer = setInterval(() => {
    if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "ping" }));
  }, 10000);
}

function requestReplay() {
  if (lastAudioBlob) playAudioBlob(lastAudioBlob);
  else if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "replay" }));
}

async function playAudioBlob(blob) {
  try {
    const ab  = await blob.arrayBuffer();
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    await ctx.resume();
    const buf = await ctx.decodeAudioData(ab);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.onended = () => ctx.close();
    src.start(0);
  } catch(e) {
    const url = URL.createObjectURL(blob);
    const a = new Audio(url);
    a.onended = () => URL.revokeObjectURL(url);
    a.play();
  }
}

// ---------------------------------------------------------------------------
// LiveKit — comunicazioni vocali
// ---------------------------------------------------------------------------
async function connectLiveKit() {
  try {
    const resp = await fetch(`${HTTP_PROTOCOL}//${SERVER_HOST}/api/livekit/token/operator/${CAMERA_ID}`);
    const data = await resp.json();
    addLog(`Token LiveKit ricevuto`, "ok");

    const { Room, RoomEvent } = LivekitClient;
    lkRoom = new Room();

    lkRoom.on(RoomEvent.Connected, () => {
      document.getElementById("lkDot").className = "dot green";
      document.getElementById("lkLabel").textContent = "VOCE ✓";
      addLog("Voce connessa", "ok");
    });

    lkRoom.on(RoomEvent.Disconnected, () => {
      document.getElementById("lkDot").className = "dot red";
      document.getElementById("lkLabel").textContent = "VOCE";
      addLog("Voce disconnessa — riconnessione...", "warn");
      setTimeout(connectLiveKit, 3000);
    });

    // Riproduce audio remoto (es. voce regia)
    lkRoom.on(LivekitClient.RoomEvent.TrackSubscribed, (track, pub, participant) => {
      if (track.kind === 'audio') {
        const audioEl = track.attach();
        audioEl.style.display = 'none';
        document.body.appendChild(audioEl);
        addLog(`Audio da: ${participant.identity}`, "ok");
      }
    });

    // Notifica quando la regia parla
    lkRoom.on(LivekitClient.RoomEvent.ActiveSpeakersChanged, (speakers) => {
      const regiaActive = speakers.some(s => s.identity === 'director');
      const badge = document.getElementById('lkDot');
      if (badge) badge.className = regiaActive ? 'dot orange' : 'dot green';
    });

    await lkRoom.connect(data.url, data.token);

    // Pubblica track audio MUTATO — diventa attivo solo con PTT
    localTrack = await LivekitClient.createLocalAudioTrack({
      echoCancellation: true, noiseSuppression: true,
    });
    await lkRoom.localParticipant.publishTrack(localTrack);
    await new Promise(r => setTimeout(r, 300));
    await localTrack.mute();

    // Avvia VU meter mic indipendente dal mute LiveKit
    startMicVu(localTrack);
    addLog("Microfono pronto — PTT attivo", "ok");

  } catch(e) {
    addLog("Errore LiveKit: " + e.message, "err");
    setTimeout(connectLiveKit, 5000);
  }
}

// ---------------------------------------------------------------------------
// PTT + LATCH
// ---------------------------------------------------------------------------
let latchMode = false;       // false = PTT, true = Latch
let latchActive = false;     // mic aperto in latch
let lastTapTime = 0;
const DOUBLE_TAP_MS = 350;

function pttOn() {
  if (!localTrack || latchMode) return;
  localTrack.unmute();
  if (localTrack._confTrack) localTrack._confTrack.unmute();
  document.getElementById("pttBtn").classList.add("active");
  document.getElementById("pttLabel").textContent = "● TX";
}

function pttOff() {
  if (!localTrack || latchMode) return;
  localTrack.mute();
  if (localTrack._confTrack) localTrack._confTrack.mute();
  document.getElementById("pttBtn").classList.remove("active");
  document.getElementById("pttLabel").textContent = "TIENI PER PARLARE";
}

function pttTap() {
  const now = Date.now();
  const isDouble = (now - lastTapTime) < DOUBLE_TAP_MS;
  lastTapTime = now;

  if (isDouble) {
    // Doppio tap — toglie la latch mode
    if (latchMode) {
      latchMode = false;
      latchActive = false;
      localTrack?.mute();
      document.getElementById("pttBtn").classList.remove("active");
      document.getElementById("pttBtn").style.borderColor = '';
      document.getElementById("pttLabel").textContent = "TIENI PER PARLARE";
      addLog("Latch MODE disattivato", "warn");
    }
    return;
  }

  if (latchMode) {
    // In latch: tap singolo toglie/mette muto
    latchActive = !latchActive;
    if (latchActive) {
      localTrack?.unmute();
      document.getElementById("pttBtn").classList.add("active");
      document.getElementById("pttLabel").textContent = "● LATCH TX";
      addLog("Latch: mic APERTO", "warn");
    } else {
      localTrack?.mute();
      document.getElementById("pttBtn").classList.remove("active");
      document.getElementById("pttLabel").textContent = "LATCH — tocca per parlare";
      addLog("Latch: mic CHIUSO", "");
    }
  }
}

function enableLatch() {
  latchMode = true;
  latchActive = false;
  document.getElementById("pttBtn").style.borderColor = 'var(--yellow, #ffd60a)';
  document.getElementById("pttLabel").textContent = "LATCH — tocca per parlare";
  addLog("Latch MODE attivato — doppio tap per uscire", "warn");
}

// Pulsante touch — PTT con rilevamento doppio tap per latch
const pttBtnEl = document.getElementById("pttBtn");
let pttTouchStart = 0;

pttBtnEl.addEventListener('touchstart', (e) => {
  e.preventDefault();
  pttTouchStart = Date.now();
  const now = Date.now();
  if ((now - lastTapTime) < DOUBLE_TAP_MS && !latchMode) {
    // Doppio tap — attiva latch
    enableLatch();
    lastTapTime = 0;
    return;
  }
  lastTapTime = now;
  pttOn();
}, { passive: false });

pttBtnEl.addEventListener('touchend', (e) => {
  e.preventDefault();
  const held = Date.now() - pttTouchStart;
  if (latchMode) {
    pttTap();
  } else {
    pttOff();
  }
}, { passive: false });

// Mouse (desktop)
pttBtnEl.addEventListener('mousedown', pttOn);
pttBtnEl.addEventListener('mouseup', pttOff);
pttBtnEl.addEventListener('mouseleave', pttOff);

// Tasto spazio come PTT da tastiera (desktop)
document.addEventListener('keydown', e => { if (e.code === 'Space' && !e.repeat) pttOn(); });
document.addEventListener('keyup',   e => { if (e.code === 'Space') pttOff(); });

// ---------------------------------------------------------------------------
// Tasto Bluetooth — Enter (tasto piccolo shutter)
// Tap singolo  → PTT toggle (apre/chiude mic)
// Doppio tap   → attiva/disattiva Latch
// Tap lungo    → Replay ultima istruzione
// ---------------------------------------------------------------------------
let btPressTime   = 0;
let btTapCount    = 0;
let btTapTimer    = null;
let btPttOpen     = false;
const BT_LONG_MS  = 800;   // soglia tap lungo
const BT_DTAP_MS  = 350;   // finestra doppio tap

document.addEventListener('keydown', e => {
  if (e.code !== 'Enter' || e.repeat) return;
  e.preventDefault();
  btPressTime = Date.now();
});

document.addEventListener('keyup', e => {
  if (e.code !== 'Enter') return;
  e.preventDefault();

  const held = Date.now() - btPressTime;

  // Tap lungo — Replay
  if (held >= BT_LONG_MS) {
    addLog("BT: tap lungo → Replay", "warn");
    requestReplay();
    btTapCount = 0;
    if (btTapTimer) clearTimeout(btTapTimer);
    return;
  }

  // Tap corto — conta i tap
  btTapCount++;
  if (btTapTimer) clearTimeout(btTapTimer);

  btTapTimer = setTimeout(() => {
    // Tap singolo — PTT toggle (doppio tap ignorato sul BT)
    if (!latchMode) {
      if (btPttOpen) {
        pttOff();
        btPttOpen = false;
        addLog("BT: tap → PTT OFF", "");
      } else {
        pttOn();
        btPttOpen = true;
        addLog("BT: tap → PTT ON", "warn");
      }
    } else {
      // In latch mode — toggle mic
      pttTap();
      addLog("BT: tap → Latch toggle", "warn");
    }
    btTapCount = 0;
  }, BT_DTAP_MS);
});

// ---------------------------------------------------------------------------
// Conference room — canale condiviso tra camere selezionate
// ---------------------------------------------------------------------------
let confRoom = null;
let confTrack = null;

async function joinConference(token) {
  if (confRoom) await leaveConference();
  addLog("Entrando in canale conference...", "warn");
  try {
    const { Room, RoomEvent } = LivekitClient;
    confRoom = new Room();
    confRoom.on(RoomEvent.TrackSubscribed, (track) => {
      if (track.kind === 'audio') {
        const el = track.attach();
        el.style.display = 'none';
        document.body.appendChild(el);
      }
    });
    await confRoom.connect(lkRoom.url || `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/livekit`, token);
    confTrack = await LivekitClient.createLocalAudioTrack({ echoCancellation: true, noiseSuppression: true });
    await confRoom.localParticipant.publishTrack(confTrack);
    await new Promise(r => setTimeout(r, 300));
    // Collega il PTT anche alla conference room
    localTrack._confTrack = confTrack;
    addLog("Conference: connesso ✓", "ok");
    document.getElementById("lkLabel").textContent = "CONF ✓";
  } catch(e) {
    addLog("Errore conference: " + e.message, "err");
  }
}

async function leaveConference() {
  if (!confRoom) return;
  await confRoom.disconnect();
  confRoom = null;
  confTrack = null;
  if (localTrack) localTrack._confTrack = null;
  addLog("Conference: uscito", "warn");
  document.getElementById("lkLabel").textContent = "VOCE ✓";
}

// Visibility change
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible') {
    document.getElementById("silentAudio").play().catch(()=>{});
    if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
    if (!wakeLock || wakeLock.released) {
      try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
    }
    // Resume keepalive AudioContext se sospeso da Android
    if (keepaliveCtx?.state === 'suspended') {
      keepaliveCtx.resume().catch(()=>{});
      addLog('Mic keepalive ripristinato', 'warn');
    }
    if (!ws || ws.readyState !== WebSocket.OPEN) connectWS();
    if (!lkRoom || lkRoom.state !== 'connected') connectLiveKit();
  }
});

// Avvia VU meter mic nell'overlay non appena la pagina è pronta
// (richiede interazione utente per getUserMedia — parte al primo tocco)
document.addEventListener('touchstart', function initOverlayVu() {
  startOverlayVu();
  document.removeEventListener('touchstart', initOverlayVu);
}, { once: true });
// Su desktop parte subito
startOverlayVu();
</script>
