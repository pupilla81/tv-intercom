<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Intercom — CAM</title>
<style>
:root {
  --bg: #0a0a0a; --surface: #141414; --border: #222;
  --text: #e0e0e0; --muted: #555;
  --accent: #00A8FF; --green: #00E676; --red: #FF1744; --orange: #FF6B00;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Courier New', monospace;
  min-height: 100dvh; display: flex; flex-direction: column;
  align-items: center; justify-content: space-between;
  padding: 24px 20px 40px; gap: 16px; user-select: none;
}
.cam-label { font-size:11px; letter-spacing:5px; color:var(--muted); text-transform:uppercase; }
.cam-number { font-size:52px; font-weight:bold; letter-spacing:2px; line-height:1; color:var(--accent); }
.badge { display:flex; align-items:center; gap:6px; background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:5px 12px; font-size:11px; letter-spacing:1px; }
.dot { width:7px; height:7px; border-radius:50%; }
.dot.green { background:var(--green); box-shadow:0 0 6px var(--green); }
.dot.red { background:var(--red); }
.dot.orange { background:var(--orange); animation:pulse 0.8s infinite; }
.status-bar { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; width:100%; }

/* PTT Button — grande, centrale */
.ptt-btn {
  width: 200px; height: 200px;
  border-radius: 50%;
  border: 3px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px;
  transition: all 0.08s;
  -webkit-touch-callout: none;
}
.ptt-btn:active, .ptt-btn.active {
  background: rgba(255,107,0,0.15);
  border-color: var(--orange);
  box-shadow: 0 0 40px rgba(255,107,0,0.4);
  transform: scale(0.96);
}
.ptt-icon { font-size: 48px; }
.ptt-label { font-size:11px; letter-spacing:4px; color:var(--muted); text-transform:uppercase; }
.ptt-btn.active .ptt-label { color:var(--orange); }

/* Replay button */
.replay-btn {
  width:100%; max-width:340px; height:80px;
  background:var(--surface); border:2px solid var(--border); border-radius:12px;
  cursor:pointer; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:6px; transition:all 0.1s;
}
.replay-btn:active { background:#00A8FF11; border-color:var(--accent); }

.log-box { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.log-header { padding:6px 14px; font-size:10px; letter-spacing:3px; color:var(--muted); border-bottom:1px solid var(--border); }
.log-entries { height:80px; overflow-y:auto; padding:8px 14px; display:flex; flex-direction:column; gap:3px; }
.log-entry { display:flex; gap:10px; font-size:11px; }
.log-time { color:var(--muted); min-width:72px; }
.log-msg.ok { color:var(--green); }
.log-msg.warn { color:var(--orange); }
.log-msg.err { color:var(--red); }

/* Unlock overlay */
#overlay {
  position:fixed; inset:0; z-index:999; background:#0a0a0a;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:30px;
}
.unlock-btn {
  width:100%; max-width:280px; background:var(--accent);
  border:none; border-radius:12px; padding:18px; cursor:pointer;
  font-size:13px; font-family:monospace; letter-spacing:3px;
  color:#fff; font-weight:bold; text-transform:uppercase; margin-top:8px;
}

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>

<!-- Silent audio loop — Spotify approach -->
<audio id="silentAudio" loop preload="auto" style="display:none" src="/operator/silent.mp3"></audio>

<!-- Unlock overlay -->
<div id="overlay">
  <div style="font-size:44px">🎙</div>
  <div style="font-size:13px;letter-spacing:4px;color:#888;text-transform:uppercase">TV Intercom</div>
  <div id="camLabelOverlay" style="font-size:11px;letter-spacing:3px;color:#555;"></div>
  <button class="unlock-btn" onclick="unlock()">Entra in servizio</button>
  <div style="font-size:10px;color:#333;letter-spacing:2px;text-align:center">Connessione vocale + istruzioni automatiche</div>
</div>

<div style="text-align:center;">
  <div class="cam-label">CAMERA</div>
  <div class="cam-number" id="camNum">—</div>
</div>

<div class="status-bar">
  <div class="badge"><div class="dot red" id="wsDot"></div><span id="wsLabel">ISTRUZIONI</span></div>
  <div class="badge"><div class="dot red" id="lkDot"></div><span id="lkLabel">VOCE</span></div>
</div>

<!-- PTT button -->
<button class="ptt-btn" id="pttBtn"
  onmousedown="pttOn()" onmouseup="pttOff()" onmouseleave="pttOff()"
  ontouchstart="(e)=>{e.preventDefault();pttOn()}" ontouchend="pttOff()">
  <span class="ptt-icon">🎙</span>
  <span class="ptt-label" id="pttLabel">TIENI PER PARLARE</span>
</button>

<!-- Replay last instruction -->
<button class="replay-btn" onclick="requestReplay()">
  <span style="font-size:24px">↩</span>
  <span style="font-size:10px;letter-spacing:3px;color:var(--muted)">RIASCOLTA</span>
</button>

<div class="log-box">
  <div class="log-header">LOG</div>
  <div class="log-entries" id="logEntries"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
<script>
const params       = new URLSearchParams(window.location.search);
const CAMERA_ID    = parseInt(params.get("cam") || "1");
const SERVER_HOST  = window.location.host;
const WS_PROTOCOL  = location.protocol === "https:" ? "wss" : "ws";
const HTTP_PROTOCOL = location.protocol;
const WS_URL       = `${WS_PROTOCOL}://${SERVER_HOST}/ws/camera/${CAMERA_ID}`;

document.getElementById("camNum").textContent = CAMERA_ID;
document.getElementById("camLabelOverlay").textContent = "CAMERA " + CAMERA_ID;

// Manifest dinamico
document.head.querySelector('[rel=manifest]')?.setAttribute('href', `manifest.json?cam=${CAMERA_ID}`);

let ws = null, reconnectTimer = null, heartbeatTimer = null;
let wakeLock = null, lastAudioBlob = null;
let lkRoom = null, localTrack = null;

// ---------------------------------------------------------------------------
// Log
// ---------------------------------------------------------------------------
function addLog(msg, type = "") {
  const c = document.getElementById("logEntries");
  const t = new Date().toLocaleTimeString("it-IT");
  const e = document.createElement("div");
  e.className = "log-entry";
  e.innerHTML = `<span class="log-time">${t}</span><span class="log-msg ${type}">${msg}</span>`;
  c.appendChild(e);
  c.scrollTop = c.scrollHeight;
  while (c.children.length > 30) c.removeChild(c.firstChild);
}

// ---------------------------------------------------------------------------
// Unlock
// ---------------------------------------------------------------------------
async function unlock() {
  document.getElementById("overlay").style.display = "none";
  // Avvia silent audio (Spotify approach)
  document.getElementById("silentAudio").volume = 0.001;
  document.getElementById("silentAudio").play().catch(()=>{});
  // MediaSession
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: `TV Intercom — CAM ${CAMERA_ID}`, artist: 'In servizio', album: 'TV Intercom',
    });
    navigator.mediaSession.playbackState = 'playing';
    navigator.mediaSession.setActionHandler('play', () => document.getElementById("silentAudio").play());
    navigator.mediaSession.setActionHandler('pause', () => document.getElementById("silentAudio").play());
  }
  // Wake Lock
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
  }
  // Connetti WebSocket istruzioni
  connectWS();
  // Connetti LiveKit voce
  connectLiveKit();
}

// ---------------------------------------------------------------------------
// WebSocket — istruzioni automatiche (invariato)
// ---------------------------------------------------------------------------
function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    document.getElementById("wsDot").className = "dot green";
    document.getElementById("wsLabel").textContent = "ISTRUZIONI ✓";
    addLog("Istruzioni connesse", "ok");
    startHeartbeat();
  };
  ws.onclose = () => {
    document.getElementById("wsDot").className = "dot red";
    document.getElementById("wsLabel").textContent = "ISTRUZIONI";
    reconnectTimer = setTimeout(connectWS, 3000);
  };
  ws.onmessage = (event) => {
    if (typeof event.data === "string") {
      const msg = JSON.parse(event.data);
      if (msg.type === "instruction" || msg.type === "instruction_text") {
        if (msg.text) addLog(`▶ ${msg.text}`, "ok");
      } else if (msg.type === "pong") {}
    } else if (event.data instanceof Blob) {
      lastAudioBlob = event.data;
      playAudioBlob(event.data);
    }
  };
}

function startHeartbeat() {
  if (heartbeatTimer) clearInterval(heartbeatTimer);
  heartbeatTimer = setInterval(() => {
    if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "ping" }));
  }, 10000);
}

function requestReplay() {
  if (lastAudioBlob) playAudioBlob(lastAudioBlob);
  else if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "replay" }));
}

async function playAudioBlob(blob) {
  try {
    const ab  = await blob.arrayBuffer();
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    await ctx.resume();
    const buf = await ctx.decodeAudioData(ab);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.onended = () => ctx.close();
    src.start(0);
  } catch(e) {
    const url = URL.createObjectURL(blob);
    const a = new Audio(url);
    a.onended = () => URL.revokeObjectURL(url);
    a.play();
  }
}

// ---------------------------------------------------------------------------
// LiveKit — comunicazioni vocali
// ---------------------------------------------------------------------------
async function connectLiveKit() {
  try {
    const resp = await fetch(`${HTTP_PROTOCOL}//${SERVER_HOST}/api/livekit/token/operator/${CAMERA_ID}`);
    const data = await resp.json();
    addLog(`Token LiveKit ricevuto`, "ok");

    const { Room, RoomEvent } = LivekitClient;
    lkRoom = new Room();

    lkRoom.on(RoomEvent.Connected, () => {
      document.getElementById("lkDot").className = "dot green";
      document.getElementById("lkLabel").textContent = "VOCE ✓";
      addLog("Voce connessa", "ok");
    });

    lkRoom.on(RoomEvent.Disconnected, () => {
      document.getElementById("lkDot").className = "dot red";
      document.getElementById("lkLabel").textContent = "VOCE";
      addLog("Voce disconnessa — riconnessione...", "warn");
      setTimeout(connectLiveKit, 3000);
    });

    await lkRoom.connect(data.url, data.token);

    // Pubblica track audio in muto — diventa attivo con PTT
    localTrack = await LivekitClient.createLocalAudioTrack({
      echoCancellation: true, noiseSuppression: true,
    });
    await lkRoom.localParticipant.publishTrack(localTrack, { muted: true });
    addLog("Microfono pronto (muto)", "ok");

  } catch(e) {
    addLog("Errore LiveKit: " + e.message, "err");
    setTimeout(connectLiveKit, 5000);
  }
}

// ---------------------------------------------------------------------------
// PTT
// ---------------------------------------------------------------------------
function pttOn() {
  if (!localTrack) return;
  localTrack.unmute();
  document.getElementById("pttBtn").classList.add("active");
  document.getElementById("pttLabel").textContent = "● TRASMISSIONE";
  addLog("PTT ON — trasmissione aperta", "warn");
}

function pttOff() {
  if (!localTrack) return;
  localTrack.mute();
  document.getElementById("pttBtn").classList.remove("active");
  document.getElementById("pttLabel").textContent = "TIENI PER PARLARE";
  addLog("PTT OFF", "");
}

// Tasto spazio come PTT da tastiera
document.addEventListener('keydown', e => { if (e.code === 'Space' && !e.repeat) pttOn(); });
document.addEventListener('keyup',   e => { if (e.code === 'Space') pttOff(); });

// Visibility change
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible') {
    document.getElementById("silentAudio").play().catch(()=>{});
    if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
    if (!wakeLock || wakeLock.released) {
      try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
    }
    if (!ws || ws.readyState !== WebSocket.OPEN) connectWS();
    if (!lkRoom || lkRoom.state !== 'connected') connectLiveKit();
  }
});
</script>
</body>
</html>
